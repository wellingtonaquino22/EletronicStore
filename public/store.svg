<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="64" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect width="64" height="64" rx="16" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="20" stroke="url(#g1)" stroke-width="0.8" opacity="0.2" fill="none"/>

  <!-- Circuit dots -->
  <circle cx="32" cy="12" r="1.5" fill="#10b981" opacity="0.5"/>
  <circle cx="32" cy="52" r="1.5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="12" cy="32" r="1.5" fill="#10b981" opacity="0.5"/>
  <circle cx="52" cy="32" r="1.5" fill="#8b5cf6" opacity="0.5"/>

  <!-- Circuit lines from center -->
  <line x1="32" y1="13.5" x2="32" y2="20" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>
  <line x1="32" y1="44" x2="32" y2="50.5" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
  <line x1="13.5" y1="32" x2="20" y2="32" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>
  <line x1="44" y1="32" x2="50.5" y2="32" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>

  <!-- Lightning bolt (main icon) -->
  <g filter="url(#glow)">
    <polygon
      points="36,13 24,33 31,33 28,51 40,31 33,31"
      fill="url(#g2)"
    />
  </g>
</svg>
